<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="description" content="Contact Us">
    <meta name="keywords" content="one, two, three">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Contact</title>

    <!-- external CSS link -->
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/contact.css">
    <link rel="icon" type="image/svg+xml" href="images/recipe.svg">
  </head>
  <body>
    <header>
      <nav>
        <a href="index.html">
          <img id="digidish-logo" src="images/digidish_nav_logo.png" alt="digidish logo">
        </a>
        <ul class="nav-list" id="navList">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="contact.html" class="active">Contact</a></li>
          <li><a href="resources.html">Resources</a></li>
          <li><a href="recipeSearch.html">Recipe Search</a></li>
          <li><a href="weeklyPlanner.html">Weekly Planner</a></li>
        </ul>
        <!-- hamburger menu for smaller screen sizes -->
        <div class="hamburger" id="hamburger">
          <button class="hamburger-icon">≡</button>
        </div>
      </nav>
    </header>

    <main>
      <section>
        <h1>Contact</h1>
        <p>
          Let's get the conversation started. Tell us a bit about yourself, and
          we will get in touch as soon as we can.
        </p>
        <form>
          <div>
            <label for="firstName">First name</label>
            <input type="text" id="firstName" name="firstName">
          </div>
          <div>
            <label for="lastName">Last name</label>
            <input type="text" id="lastName" name="lastName">
          </div>
          <div>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
          </div>
          <div>
            <label for="message">Message</label>
            <textarea id="message" name="text" required></textarea>
          </div>
          <div>
            <button type="submit">Contact</button>
          </div>
        </form>
      </section>
    </main>

    <footer>
      <span>Group 2</span>
    </footer>
    <script src="js/script.js"></script>
  </body>
</html>
