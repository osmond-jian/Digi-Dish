<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="description" content="Weeky Planner">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly Planner</title>

  <!-- external CSS link -->
  <link rel="stylesheet" href="css/normalize.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/weeklyPlanner.css">
  <link rel="icon" type="image/svg+xml" href="images/recipe.svg">
</head>

<body>
  <header>
    <nav>
      <a href="index.html">
        <img id="digidish-logo" src="images/digidish_nav_logo.png" alt="digidish logo">
      </a>
      <ul class="nav-list" id="navList">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="resources.html">Resources</a></li>
        <li><a href="recipeSearch.html">Recipe Search</a></li>
        <li><a href="weeklyPlanner.html" class="active">Weekly Planner</a></li>
      </ul>
      <!-- hamburger menu for smaller screen sizes -->
      <div class="hamburger" id="hamburger">
        <button class="hamburger-icon">≡</button>
      </div>
    </nav>
  </header>

  <main>
    <div class="container">
      <div class="search-area">
        <h1>Search Recipes</h1>
        <input id="searchInput" placeholder="Search recipe...">
        <button class="recipe-search-button">Search</button>
        <div id="results"></div>
      </div>

      <div class="planner">
        <h2>Weekly Planner</h2>
        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th scope="col">Day</th>
                <th scope="col">Breakfast</th>
                <th scope="col">Lunch</th>
                <th scope="col">Dinner</th>
              </tr>
            </thead>
  
            <tbody>
              <tr>
                <td><strong>Monday</strong></td>
                <td id="Monday-Breakfast">-</td>
                <td id="Monday-Lunch">-</td>
                <td id="Monday-Dinner">-</td>
              </tr>
  
              <tr>
                <td><strong>Tuesday</strong></td>
                <td id="Tuesday-Breakfast">-</td>
                <td id="Tuesday-Lunch">-</td>
                <td id="Tuesday-Dinner">-</td>
              </tr>
  
              <tr>
                <td><strong>Wednesday</strong></td>
                <td id="Wednesday-Breakfast">-</td>
                <td id="Wednesday-Lunch">-</td>
                <td id="Wednesday-Dinner">-</td>
              </tr>
  
              <tr>
                <td><strong>Thursday</strong></td>
                <td id="Thursday-Breakfast">-</td>
                <td id="Thursday-Lunch">-</td>
                <td id="Thursday-Dinner">-</td>
              </tr>
  
              <tr>
                <td><strong>Friday</strong></td>
                <td id="Friday-Breakfast">-</td>
                <td id="Friday-Lunch">-</td>
                <td id="Friday-Dinner">-</td>
              </tr>
  
              <tr>
                <td><strong>Saturday</strong></td>
                <td id="Saturday-Breakfast">-</td>
                <td id="Saturday-Lunch">-</td>
                <td id="Saturday-Dinner">-</td>
              </tr>
  
              <tr>
                <td><strong>Sunday</strong></td>
                <td id="Sunday-Breakfast">-</td>
                <td id="Sunday-Lunch">-</td>
                <td id="Sunday-Dinner">-</td>
              </tr>
            </tbody>
          </table>
        </div>

      </div>

      <div class="grocery">
        <h2>Generated Grocery List</h2>
        <button>Generate Grocery List</button>
        <ul id="groceryList"></ul>
      </div>
    </div>
  </main>

  <footer>
    <span>Group 2</span>
  </footer>
  <script src="js/script.js"></script>
</body>

</html>
